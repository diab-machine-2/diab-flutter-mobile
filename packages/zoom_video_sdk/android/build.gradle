group 'com.flutterzoom.videosdk'
version '1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

android {
    namespace "com.flutterzoom.videosdk"
    compileSdkVersion 31

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        minSdkVersion 24
    }
}

dependencies {
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
    implementation "com.google.crypto.tink:tink-android:1.7.0"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "us.zoom.videosdk:zoomvideosdk-core:1.10.11"
    implementation "us.zoom.videosdk:zoomvideosdk-videoeffects:1.10.11"
    implementation "us.zoom.videosdk:zoomvideosdk-annotation:1.10.11"
}
